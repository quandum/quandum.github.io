<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản Phẩm Công Ty H&H</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1b2230;
      --muted: #566174;
      --accent: #0f7a5b;
      --accent-strong: #0a5c44;
      --border: #d9e1ec;
      --soft: #eef4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 122, 91, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(64, 117, 255, 0.12), transparent 24%),
        linear-gradient(160deg, #eef4ff 0%, #f6f7fb 42%, #eefaf4 100%);
      line-height: 1.6;
    }

    .container {
      max-width: 1120px;
      margin: 32px auto 48px;
      padding: 0 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 28px rgba(20, 30, 60, 0.08);
    }

    .banner {
      margin-bottom: 24px;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(20, 30, 60, 0.12);
      border: 1px solid var(--border);
      background: #fff;
      height: clamp(140px, 20vh, 260px);
    }

    .banner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .menu-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 8px 22px rgba(20, 30, 60, 0.06);
      flex-wrap: wrap;
    }

    .menu-bar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      background: #f2f5fb;
      border: 1px solid transparent;
      transition: all 0.25s ease;
    }

    .menu-bar a:hover {
      color: var(--accent);
      border-color: rgba(10, 122, 90, 0.25);
      background: #eaf7f2;
    }

    .intro {
      margin: 0 0 18px;
      color: var(--muted);
      text-align: center;
    }

    .filters {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 249, 255, 0.96));
      box-shadow: 0 8px 22px rgba(20, 30, 60, 0.05);
    }

    .filters-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filters-title {
      margin: 0;
      font-size: 1.02rem;
      color: var(--text);
    }

    .filters-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-field label {
      font-weight: 600;
      color: var(--text);
      font-size: 0.92rem;
    }

    .filter-field select,
    .filter-actions button {
      font: inherit;
    }

    .filter-field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .filter-field select:focus {
      border-color: rgba(15, 122, 91, 0.45);
      box-shadow: 0 0 0 3px rgba(15, 122, 91, 0.12);
    }

    .filter-actions {
      display: flex;
      align-items: end;
    }

    .filter-reset {
      width: 100%;
      border: 1px solid rgba(15, 122, 91, 0.18);
      border-radius: 10px;
      padding: 10px 12px;
      background: #eefaf4;
      color: var(--accent-strong);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .filter-reset:hover {
      transform: translateY(-1px);
      background: #e4f6ed;
    }

    .filter-summary {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: clamp(1.8rem, 3.5vw, 2.2rem);
      color: var(--accent);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(20, 30, 60, 0.08);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(20, 30, 60, 0.1);
    }

    .product-head {
      padding: 20px 20px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
    }

    /* Compact product layout */
    .product-body {
      display: flex;
      gap: 14px;
      padding: 0 20px 20px;
      align-items: flex-start;
    }

    .product-thumb {
      width: 120px;
      flex: 0 0 120px;
      border-radius: 10px;
      overflow: hidden;
      background: #f6f7fb;
      border: 1px solid #eef3f8;
    }

    .product-thumb img {
      width: 100%;
      height: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .product-info {
      flex: 1 1 auto;
      min-width: 0;
    }

    .product-description {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-height: 3.6em; /* ~2 lines */
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .count-badge {
      background: rgba(15,122,91,0.08);
      color: var(--accent-strong);
      padding: 6px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .product-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 8px;
      line-height: 1.25;
    }

    .product-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent-strong);
      border: 1px solid rgba(15, 122, 91, 0.12);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .product-description {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .toggle-images {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .toggle-images:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .toggle-images:focus-visible {
      outline: 3px solid rgba(15, 122, 91, 0.25);
      outline-offset: 2px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      padding: 0 20px 20px;
    }

    .gallery[hidden] {
      display: none;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.3s ease;
      background: #f0f4f8;
      border: 1px solid #e5ebf3;
    }

    .gallery img:hover {
      opacity: 0.8;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
    }

    .loading {
      padding: 18px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
    }

    .error {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(185, 44, 44, 0.2);
      background: #fff4f4;
      color: #9a2d2d;
    }

    body.modal-open {
      overflow: hidden;
    }

    body.modal-open .container {
      visibility: hidden;
      pointer-events: none;
    }

    .product-modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(160deg, #eef4ff 0%, #f6f7fb 42%, #eefaf4 100%);
    }

    .product-modal[hidden] {
      display: none;
    }

    .product-modal-card {
      width: min(920px, 100%);
      max-height: min(88vh, 860px);
      overflow: auto;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 22px 55px rgba(12, 21, 44, 0.28);
      padding: 20px;
    }

    .product-modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .product-modal-title {
      margin: 0;
      font-size: clamp(1.2rem, 2.6vw, 1.75rem);
      color: var(--text);
    }

    .back-to-list {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #26425f, #1f3248);
      color: #fff;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .back-to-list:hover {
      transform: translateY(-1px);
      opacity: 0.94;
    }

    .product-modal-description {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .product-modal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .product-modal-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .product-modal-gallery img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      border: 1px solid #e5ebf3;
      background: #f3f6fb;
      object-fit: cover;
    }

    @media (max-width: 640px) {
      .container {
        margin-top: 18px;
        padding: 0 14px;
      }

      .card {
        padding: 18px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        padding: 0 16px 16px;
      }

      .filters-grid {
        grid-template-columns: 1fr;
      }

      .product-modal {
        padding: 12px;
      }

      .product-modal-card {
        padding: 14px;
      }

      .product-modal-gallery {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="banner">
      <img src="banner.jpg" alt="Banner công ty H&amp;H">
    </div>

    <nav class="menu-bar" aria-label="Thanh menu chính">
      <a href="index.html">Giới thiệu</a>
      <a href="products.html">Sản phẩm</a>
    </nav>

    <section class="card">
      <h1>SẢN PHẨM CỦA CHÚNG TÔI</h1>
      <p class="intro">Danh sách được lấy trực tiếp từ file products.json. Ảnh chỉ được tạo và tải khi bạn bấm xem từng sản phẩm.</p>
      <div class="filters" aria-label="Bộ lọc sản phẩm">
        <div class="filters-head">
          <div>
            <h2 class="filters-title">Lọc sản phẩm</h2>
            <p class="filters-note">Chọn 1, 2 hoặc 3 tiêu chí cùng lúc. Mỗi tiêu chí đều là tùy chọn.</p>
          </div>
        </div>
        <div class="filters-grid">
          <div class="filter-field">
            <label for="filter-cost">nắp phí</label>
            <select id="filter-cost">
              <option value="all">Tất cả</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="filter-color">Màu</label>
            <select id="filter-color">
              <option value="all">Tất cả</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="filter-type">Loại</label>
            <select id="filter-type">
              <option value="all">Tất cả</option>
            </select>
          </div>
          <div class="filter-actions">
            <button id="filter-reset" class="filter-reset" type="button">Xóa lọc</button>
          </div>
        </div>
        <p id="filter-summary" class="filter-summary"></p>
      </div>
      <div id="products-status" class="status loading">Đang tải danh sách sản phẩm...</div>
      <div id="products-grid" class="products-grid" aria-live="polite"></div>
    </section>
  </main>

  <section id="product-modal" class="product-modal" hidden aria-live="polite" aria-label="Xem chi tiết sản phẩm">
    <article class="product-modal-card" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
      <div class="product-modal-top">
        <h2 id="product-modal-title" class="product-modal-title"></h2>
        <button id="close-product-modal" type="button" class="back-to-list">Quay về danh mục</button>
      </div>
      <p id="product-modal-description" class="product-modal-description"></p>
      <div id="product-modal-meta" class="product-modal-meta"></div>
      <div id="product-modal-gallery" class="product-modal-gallery"></div>
    </article>
  </section>

  <!-- products.json is loaded dynamically; embedded JSON removed -->

  <script>
    const productsGrid = document.getElementById('products-grid');
    const productsStatus = document.getElementById('products-status');
    const filterCost = document.getElementById('filter-cost');
    const filterColor = document.getElementById('filter-color');
    const filterType = document.getElementById('filter-type');
    const filterReset = document.getElementById('filter-reset');
    const filterSummary = document.getElementById('filter-summary');
    const productModal = document.getElementById('product-modal');
    const productModalTitle = document.getElementById('product-modal-title');
    const productModalDescription = document.getElementById('product-modal-description');
    const productModalMeta = document.getElementById('product-modal-meta');
    const productModalGallery = document.getElementById('product-modal-gallery');
    const closeProductModalButton = document.getElementById('close-product-modal');
    let allProducts = [];

    function getUniqueValues(products, key) {
      return [...new Set(products.map((product) => product[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
    }

    function populateSelect(selectElement, values) {
      // keep the first default option (value 'all'), remove others
      while (selectElement.options.length > 1) selectElement.remove(selectElement.options.length - 1);
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        selectElement.appendChild(option);
      });
    }

    function getActiveFilters() {
      return {
        cost: filterCost.value,
        color: filterColor.value,
        type: filterType.value,
      };
    }

    function matchesFilter(product, filters) {
      return (
        (filters.cost === 'all' || product.cost === filters.cost) &&
        (filters.color === 'all' || product.color === filters.color) &&
        (filters.type === 'all' || product.type === filters.type)
      );
    }

    function updateSummary(visibleCount) {
      const filters = getActiveFilters();
      const activeFilters = [];

      if (filters.cost !== 'all') activeFilters.push(`nắp phí ${filters.cost}`);
      if (filters.color !== 'all') activeFilters.push(`màu ${filters.color}`);
      if (filters.type !== 'all') activeFilters.push(`loại ${filters.type}`);

      if (activeFilters.length === 0) {
        filterSummary.textContent = `Đang hiển thị ${visibleCount} sản phẩm.`;
        return;
      }

      filterSummary.textContent = `Đang lọc theo ${activeFilters.join(', ')}. Còn ${visibleCount} sản phẩm phù hợp.`;
    }

    function renderProducts() {
      const filters = getActiveFilters();
      const visibleProducts = allProducts.filter((product) => matchesFilter(product, filters));

      productsGrid.innerHTML = '';

      if (visibleProducts.length === 0) {
        productsStatus.className = 'status error';
        productsStatus.textContent = 'Không có sản phẩm nào khớp bộ lọc hiện tại.';
        updateSummary(0);
        return;
      }

      productsStatus.className = 'status loading';
      productsStatus.textContent = 'Danh sách đã sẵn sàng.';

      visibleProducts.forEach((product) => {
        productsGrid.appendChild(createProductCard(product));
      });

      updateSummary(visibleProducts.length);
    }

    function openProductModal(product) {
      productModalTitle.textContent = product.name;
      productModalDescription.textContent = product.description || '';

      productModalMeta.innerHTML = '';
      const costTag = document.createElement('span');
      costTag.className = 'tag';
      costTag.textContent = `nắp phí: ${product.cost}`;

      const colorTag = document.createElement('span');
      colorTag.className = 'tag';
      colorTag.textContent = `màu: ${product.color}`;

      const typeTag = document.createElement('span');
      typeTag.className = 'tag';
      typeTag.textContent = `loại: ${product.type}`;

      productModalMeta.append(costTag, colorTag, typeTag);

      productModalGallery.innerHTML = '';
      (product.images || []).forEach((imagePath, index) => {
        const image = document.createElement('img');
        image.alt = `${product.name} ${index + 1}`;
        image.loading = 'lazy';
        image.src = imagePath;
        productModalGallery.appendChild(image);
      });

      productModal.hidden = false;
      document.body.classList.add('modal-open');
    }

    function closeProductModal() {
      productModal.hidden = true;
      document.body.classList.remove('modal-open');
    }

    function createProductCard(product) {
      const card = document.createElement('article');
      card.className = 'product-card';

      const head = document.createElement('div');
      head.className = 'product-head';

      const title = document.createElement('h3');
      title.className = 'product-title';
      title.textContent = product.name;

      // compact layout: thumbnail + info
      const body = document.createElement('div');
      body.className = 'product-body';

      const thumb = document.createElement('div');
      thumb.className = 'product-thumb';
      const thumbImg = document.createElement('img');
      thumbImg.alt = product.name;
      thumbImg.loading = 'lazy';
      thumbImg.src = product.images && product.images.length ? product.images[0] : 'placeholder.png';
      thumb.appendChild(thumbImg);

      const info = document.createElement('div');
      info.className = 'product-info';

      const metaRow = document.createElement('div');
      metaRow.className = 'meta-row';

      const costTag = document.createElement('span');
      costTag.className = 'tag';
      costTag.textContent = `nắp phí: ${product.cost}`;

      const countBadge = document.createElement('span');
      countBadge.className = 'count-badge';
      countBadge.textContent = `${product.images.length} ảnh`;

      metaRow.append(costTag, countBadge);

      const description = document.createElement('p');
      description.className = 'product-description';
      description.textContent = product.description;

      const actions = document.createElement('div');
      actions.className = 'actions';

      const toggleButton = document.createElement('button');
      toggleButton.type = 'button';
      toggleButton.className = 'toggle-images';
      toggleButton.textContent = 'Xem sản phẩm';

      toggleButton.addEventListener('click', () => {
        openProductModal(product);
      });

      actions.appendChild(toggleButton);

      info.append(title, metaRow, description, actions);
      body.append(thumb, info);

      card.append(head);
      head.appendChild(body);

      return card;
    }

    async function loadProducts() {
      productsStatus.className = 'status loading';
      productsStatus.textContent = 'Đang tải danh sách sản phẩm...';

      const candidates = [
        'products.json',
        './products.json',
        // try document folder (useful when path contains filename)
        (window.location.origin === 'null' ? '' : window.location.origin) + window.location.pathname.replace(/[^/]*$/, '') + 'products.json'
      ];

      let data = null;
      for (const url of candidates) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) continue;
          data = await response.json();
          if (data) break;
        } catch (e) {
          // try next candidate
        }
      }

      if (!data || !Array.isArray(data.products) || data.products.length === 0) {
        productsStatus.className = 'status error';
        productsStatus.textContent = 'Không tải được products.json tự động. Bạn có thể chạy một server local để tải dữ liệu.';
        console.error('Failed to load products.json from candidates:', candidates);
        return;
      }

      allProducts = data.products;

      populateSelect(filterCost, getUniqueValues(allProducts, 'cost'));
      populateSelect(filterColor, getUniqueValues(allProducts, 'color'));
      populateSelect(filterType, getUniqueValues(allProducts, 'type'));

      renderProducts();
    }

    filterCost.addEventListener('change', renderProducts);
    filterColor.addEventListener('change', renderProducts);
    filterType.addEventListener('change', renderProducts);

    filterReset.addEventListener('click', () => {
      filterCost.value = 'all';
      filterColor.value = 'all';
      filterType.value = 'all';
      renderProducts();
    });

    closeProductModalButton.addEventListener('click', closeProductModal);

    loadProducts();
  </script>
</body>
</html>
